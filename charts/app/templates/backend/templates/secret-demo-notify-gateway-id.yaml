{{- if and .Values.backend.enabled .Values.backend.demoNotifyGateway.enabled }}
{{- $clientId := include "backend.demoNotifyGatewayClientId" . | trim }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-demo-notify-gateway-id
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-notify-gateway
stringData:
  DEMO_NOTIFY_GATEWAY_CLIENT_ID: {{ $clientId | quote }}
{{- end }}
